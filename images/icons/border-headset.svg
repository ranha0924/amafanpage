<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" fill="none">
  <!-- Headband arc (wraps over top of avatar) -->
  <path d="M6 26c0-10 8-18 18-18s18 8 18 26" stroke="#006f62" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- AMR lime accent stripe on headband -->
  <path d="M8.5 22c1.5-7.5 8-13 15.5-13s14 5.5 15.5 13" stroke="#c4ff00" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Left earcup (sits at 9 o'clock position) -->
  <rect x="1" y="22" width="9" height="14" rx="4" fill="#006f62"/>
  <rect x="2.5" y="24" width="6" height="10" rx="3" fill="#003d34"/>
  <!-- Right earcup (sits at 3 o'clock position) -->
  <rect x="38" y="22" width="9" height="14" rx="4" fill="#006f62"/>
  <rect x="39.5" y="24" width="6" height="10" rx="3" fill="#003d34"/>
  <!-- Mic boom from left earcup -->
  <path d="M10 34c0 4 2 6 4 8" stroke="#c4ff00" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- Mic tip -->
  <circle cx="14" cy="42" r="2.2" fill="#c4ff00"/>
</svg>
